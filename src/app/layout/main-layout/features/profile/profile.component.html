<div class="max-w-5xl mx-auto bg-white shadow-sm pb-4">
  <div class="relative h-62.5 md:h-87.5 w-full rounded-b-xl overflow-hidden group shadow-inner"
    [ngClass]="{'bg-linear-to-r from-blue-900 to-blue-500': !myProfile.cover}">
    @if (myProfile.cover) {
    <img [src]="myProfile.cover" class="w-full h-full object-cover" alt="Cover">
    } @else {
    <div class="flex items-center justify-center h-full opacity-20">
      <i class="fa-solid fa-image text-8xl text-white"></i>
    </div>
    }
    <button
      class="absolute bottom-4 right-4 bg-white hover:bg-gray-100 text-gray-900 px-3 py-2 rounded-lg flex items-center gap-2 font-semibold text-sm shadow-md transition-all">
      <i class="fa-solid fa-camera text-lg"></i>
      <span>Edit cover photo</span>
    </button>
  </div>

  <div class="px-4 md:px-8">
    <div class="relative flex flex-col md:flex-row items-center md:items-end -mt-12 md:-mt-20 mb-4 gap-4">

      <div class="relative group">
        <div class="w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-white bg-gray-300 overflow-hidden shadow-sm">
          <img [src]="myProfile.photo" class="w-full h-full object-cover" alt="Profile">
        </div>
        <button type="button" (click)="fileInput.click()" title="Change Profile Photo"
          class="absolute bottom-2 right-2 bg-gray-200 hover:bg-gray-300 p-2 rounded-full border-2 border-white shadow-sm transition-colors cursor-pointer">
          <i class="fa-solid fa-camera text-gray-700"></i>
        </button>

        <input type="file" #fileInput class="hidden" accept="image/*" (change)="uploadFile($event)">
      </div>

      <div class="flex-1 pb-2 text-center md:text-left">
        <h1 class="text-3xl font-bold text-gray-900">{{myProfile.name}}</h1>
        <p class="text-gray-600 font-semibold hover:underline cursor-pointer">{{myProfile.gender}}</p>

        <div class="flex items-center justify-center md:justify-start gap-1 text-gray-500 mt-1">
          <i class="fa-solid fa-cake-candles text-xs"></i>
          <span class="text-sm">{{myProfile.dateOfBirth}}</span>
        </div>

        <div class="flex items-center justify-center md:justify-start gap-1 text-gray-500 mt-1">
          <i class="fa-regular fa-clock text-xs"></i>
          <span class="text-sm">{{myProfile.createdAt}}</span>
        </div>

        @if (imgFile) {
        <div class="mt-3 flex items-center justify-center md:justify-start gap-2">
          <button (click)="updatePhoto()"
            class="bg-green-600 hover:bg-green-700 text-white text-xs px-3 py-1.5 rounded-md font-bold transition-all shadow-sm">
            <i class="fa-solid fa-check mr-1"></i> Confirm
          </button>
          <button (click)="imgFile = null; imgPath = ''" class="text-gray-400 text-xs hover:text-red-500">
            Cancel
          </button>
        </div>
        }
      </div>

      <div class="flex items-center gap-2 pb-3">
        <button
          class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold flex items-center gap-2 transition-colors">
          <i class="fa-solid fa-plus text-sm"></i>
          <span>Add to story</span>
        </button>
        <button
          class="bg-gray-200 hover:bg-gray-300 text-gray-900 px-4 py-2 rounded-lg font-semibold flex items-center gap-2 transition-colors">
          <i class="fa-solid fa-pen text-sm"></i>
          <span>Edit profile</span>
        </button>
        <button title="btn" class="bg-gray-200 hover:bg-gray-300 text-gray-900 px-3 py-2 rounded-lg transition-colors">
          <i class="fa-solid fa-chevron-down text-xs"></i>
        </button>
      </div>
    </div>

    <hr class="border-gray-300 mx-1">
  </div>
</div>


<div class="lg:col-start-4 lg:col-end-10 ">


  @for (post of myPost; track post._id) {
  <app-card-post [post]="post"></app-card-post>
  }
</div>
