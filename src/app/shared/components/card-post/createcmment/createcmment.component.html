<div class="max-w-2xl mx-auto p-4 bg-white rounded-xl shadow-sm">
  <div class="flex gap-2 items-start border-t pt-4">
    <div class="relative">
      <img class="w-8 h-8 rounded-full object-cover" [src]="user.photo" alt="Me">
    </div>

    <div class="flex-1 bg-gray-100 rounded-2xl px-3 py-2">
      <textarea rows="1" placeholder="Write a comment..." [(ngModel)]="commentContent"
        class="w-full bg-transparent border-none focus:ring-0 text-[15px] placeholder-gray-500 resize-none p-0 overflow-hidden min-h-5"></textarea>

      <div>
        @if(imgPath) {
        <div class="relative mt-2">
          <img [src]="imgPath" alt="Post image" class="w-full h-auto rounded-lg">
          <button title="remove" (click)="removeImg()"
            class="absolute top-2 right-2 bg-gray-100/80 hover:bg-gray-200 rounded-full p-1 text-gray-500 transition">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 14 14">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
            </svg>
          </button>
        </div>
        }
      </div>

      <div class="flex items-center justify-between mt-2">
        <div class="flex items-center gap-1 text-gray-500">
          <button class="p-1.5 hover:bg-gray-200 rounded-full transition-colors" title="Emoji">
            <i class="fa-regular fa-face-smile text-lg"></i>
          </button>

          <button type="button" (click)="imageInput.click()"
            class="p-1.5 hover:bg-gray-200 rounded-full transition-colors" title="Camera">
            <i class="fa-solid fa-camera text-lg"></i>
          </button>

          <input type="file" #imageInput class="hidden" (change)="uploadFile($event)" accept="image/*">

          <button class="p-1.5 hover:bg-gray-200 rounded-full transition-colors" title="GIF">
            <i class="fa-regular fa-image text-lg"></i>
          </button>
        </div>

        <button (click)="creatcomment()" [disabled]="!commentContent && !imgfile" class="transition-colors"
          [class]="(commentContent || imgfile) ? 'text-blue-600' : 'text-gray-400'" title="send">
          <svg class="w-5 h-5 rotate-90" fill="currentColor" viewBox="0 0 20 20">
            <path
              d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z">
            </path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
