@for (comment of commnetList; track comment._id) {
<div class="max-w-2xl mx-auto p-4 bg-white rounded-xl shadow-sm">
  <div class="space-y-4 mb-6">
    <div class="flex gap-2">
      <img class="w-8 h-8 rounded-full object-cover mt-1" [src]="comment.commentCreator.photo" alt="Profile Picture">
      <div class="flex flex-col items-start group">

        <div class="flex items-center gap-2">
          <div class="bg-gray-100 px-3 py-2 rounded-2xl relative max-w-sm">
            <h4 class="text-[13px] font-bold text-gray-900">{{comment.commentCreator.name}}</h4>
            <p class="text-[15px] text-gray-800 leading-tight">{{comment.content}}</p>
            @if (comment.image) {
            <div class="mt-2">
              <img [src]="comment.image" alt="reply image"
                class="max-w-50 max-h-50 rounded-lg object-contain border border-gray-200">
            </div>
            }
          </div>

          <div class="relative">
            <button title="btn" [id]="'dropdownButton-' + comment._id"
              [attr.data-dropdown-toggle]="'dropdownMenu-' + comment._id"
              class="p-2 rounded-full hover:bg-gray-100 opacity-0 group-hover:opacity-100 transition-opacity text-gray-500"
              type="button">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path
                  d="M6 10a2 2 0 11-4 0 2 2 0 014 0zM12 10a2 2 0 11-4 0 2 2 0 014 0zM16 12a2 2 0 100-4 2 2 0 000 4z">
                </path>
              </svg>
            </button>

            <div [id]="'dropdownMenu-' + comment._id"
              class="z-10 hidden bg-white divide-y divide-gray-100 rounded-lg shadow-md w-32 border border-gray-100">
              <ul class="py-2 text-sm text-gray-700" [attr.aria-labelledby]="'dropdownButton-' + comment._id">
                <li><button (click)="toggleReply(comment._id)"
                    class="w-full text-left px-4 py-2 hover:bg-gray-100">Reply</button></li>
                <li><button class="w-full text-left px-4 py-2 hover:bg-gray-100">Edit</button></li>
                <li><button (click)="deleteComment(comment._id)"
                    class="w-full text-left px-4 py-2 hover:bg-gray-100 text-red-600">Delete</button></li>
              </ul>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-3 px-3 mt-1 text-[12px] font-bold text-gray-500">
          <span class="text-gray-400 font-normal">{{comment.createdAt | date:'shortTime'}}</span>
          <button class="hover:underline cursor-pointer">Like</button>
          <button (click)="toggleReply(comment._id)" class="hover:underline cursor-pointer">Reply</button>
        </div>
        <app-replies #repliesList [postId]="postId" [commentId]="comment._id"></app-replies>

        @if (openedReplyId === comment._id) {
        <app-create-reply [postId]="postId" [commentId]="comment._id" (replyAdded)="repliesList.loadReplies()">
        </app-create-reply>
        }
      </div>
    </div>
  </div>
</div>
}
