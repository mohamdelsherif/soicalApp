<div class="max-w-2xl mx-auto my-5">
  <div class="bg-white  rounded-xl shadow-sm border border-gray-200  p-3 flex items-center space-x-3">

    <img class="w-10 h-10 rounded-full object-cover cursor-pointer hover:opacity-90 transition" [src]="user.photo"
      alt="User profile">

    <button data-modal-target="post-modal" data-modal-toggle="post-modal"
      class="grow flex items-center bg-gray-100  hover:bg-gray-200  rounded-full px-4 py-2 cursor-pointer transition text-left">
      <span class="text-gray-500 ">What's on your mind, Mohamed Samir?</span>
    </button>

    <div class="flex items-center space-x-1 sm:space-x-2 pr-1">

      <button class="p-2 hover:bg-gray-100  rounded-full transition group" title="Live Video">
        <svg class="w-6 h-6 text-red-500" fill="currentColor" viewBox="0 0 24 24">
          <path d="M15 8v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h8a2 2 0 012 2zM17 9.5l4-3v11l-4-3v-5z" />
        </svg>
      </button>

      <button class="p-2 hover:bg-gray-100  rounded-full transition" title="Photos/Video">
        <svg class="w-6 h-6 text-green-500" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M4 5a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V7a2 2 0 00-2-2H4zm10 4a2 2 0 11-4 0 2 2 0 014 0zm-9 8l3-3 2 2 3-5 5 6H5z" />
        </svg>
      </button>

      <button class="p-2 hover:bg-gray-100  rounded-full transition" title="Feeling/Activity">
        <svg class="w-6 h-6 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8zm-3.5-9a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm7 0a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm-3.5 5.5c-2.33 0-4.312-1.46-5.106-3.5h10.212c-.794 2.04-2.776 3.5-5.106 3.5z" />
        </svg>
      </button>

    </div>
  </div>
</div>


<div id="post-modal" tabindex="-1" aria-hidden="true"
  class="fixed top-0 left-0 right-0 z-50 hidden w-full p-4 overflow-x-hidden overflow-y-auto md:inset-0 h-[calc(100%-1rem)] max-h-full">
  <div class="relative w-full max-w-lg max-h-full">
    <div class="relative bg-white rounded-xl shadow ">

      <div class="flex items-center justify-between p-4 border-b rounded-t ">
        <div class="w-10"></div>
        <h3 class="text-xl font-bold text-gray-900 ">Create post</h3>
        <button type="button"
          class="text-gray-400 bg-gray-100 hover:bg-gray-200  rounded-full text-sm w-8 h-8 inline-flex justify-center items-center  dark:text-gray-300"
          data-modal-hide="post-modal">
          <svg class="w-3 h-3" fill="none" viewBox="0 0 14 14">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
          </svg>
        </button>
      </div>

      <div class="p-4 flex items-center space-x-3">
        <img class="w-11 h-11 rounded-full object-cover" [src]="user.photo" alt="User">
        <div>
          <p class="font-bold text-gray-900 ">{{ user.name }}</p>
          <button
            class="flex items-center bg-gray-200  px-2 py-1 rounded-md text-xs font-semibold text-gray-700 dark:text-gray-300 mt-1">
            <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
              <path d="M10 2a8 8 0 100 16 8 8 0 000-16zM5.5 9.5l3 3 6-6"></path>
            </svg>
            Public <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="px-4 pb-2">
        <textarea [(ngModel)]="postContent" rows="4"
          class="block w-full text-xl text-gray-900 bg-transparent border-none focus:ring-0 placeholder-gray-400 "
          placeholder="What's on your mind, Mohamed Samir?"></textarea>
      </div>
      <div>
        @if(imgPath)
        {
        <div class="relative">
          <img [src]="imgPath" alt="Post image" class="w-full h-auto rounded-lg">
          <button (click)="removeImg()"
            class="absolute top-2 right-2 bg-gray-100 hover:bg-gray-200  rounded-full p-1 text-gray-500 transition">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 14 14">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
            </svg>
          </button>
        </div>
        }
      </div>

      <div class="px-4 mb-4">
        <div class="flex items-center justify-between border border-gray-300  p-3 rounded-lg shadow-sm">
          <span class="font-bold text-gray-700 dark:text-gray-300">Add to your post</span>

          <label for="file-upload" class="p-2 hover:bg-gray-100  rounded-full cursor-pointer transition">
            <svg class="w-7 h-7 text-green-500" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M4 5a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V7a2 2 0 00-2-2H4zm10 4a2 2 0 11-4 0 2 2 0 014 0zm-9 8l3-3 2 2 3-5 5 6H5z" />
            </svg>
            <input (change)="uploadFile($event)" id="file-upload" type="file" class="hidden" />
          </label>
        </div>
      </div>



      <div class="px-4 pb-4">
        <button (click)="creatPost()" data-modal-hide="post-modal"
          class="w-full text-gray-400 bg-gray-200  font-bold rounded-lg text-sm px-5 py-2.5 text-center cursor-pointer transition hover:bg-gray-300   ">
          Post
        </button>
      </div>

    </div>
  </div>
</div>
